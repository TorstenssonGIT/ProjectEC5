# PR Checks Workflow — Heart Disease Prediction Project
# Runs automatically on every pull request to any branch.
# Full gate before merge — tests, coverage, code style and security scan.

name: PR Checks

on: [pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt into Node.js 24 ahead of June 16 2026 deadline

jobs:
  test:
    runs-on: ubuntu-latest  # Fresh Ubuntu environment for every run

    steps:
      # Step 1: Check out the repository code
      - name: Check out repository
        uses: actions/checkout@v4

      # Step 2: Install Python 3.11 — matches the version used in development
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Install all project dependencies
      # Includes: scikit-learn, pandas, numpy, streamlit, pytest, pytest-cov
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Install code quality and security tools
      - name: Install code quality tools
        run: pip install flake8 bandit

      # Step 5: Run data preparation pipeline
      # Prepares the Cleveland dataset and saves to heart_combined.csv
      # Must run before tests so the combined dataset exists
      - name: Prepare combined dataset
        run: python src/data_preparation.py

      # Step 6: Test data preparation module
      # Tests: dataset combination, text encoding, cholesterol imputation,
      # zero value handling, deduplication, ca/thal removal
      - name: Test data preparation
        run: pytest tests/test_data_preparation.py -v

      # Step 7: Test data processing module
      # Tests: DataProcessor load, clean, split, summary, correlation matrix
      # Verifies ca/thal are dropped and default path points to heart_combined.csv
      - name: Test data processing
        run: pytest tests/test_data_processing.py -v

      # Step 8: Test model training module
      # Tests: all three pipelines (LR, RF, DT), evaluate, compare, save_best_model
      - name: Test model training
        run: pytest tests/test_model_training.py -v

      # Step 9: Test terminal app
      # Tests: HeartApp init, predict, prompt_for_inputs, run loop
      - name: Test terminal app
        run: pytest tests/test_app.py -v

      # Step 10: Test main CLI
      # Tests: argument parser, train_and_save, train_and_save_full, run_app
      - name: Test main CLI
        run: pytest tests/test_main.py -v

      # Step 11: Full coverage check across all modules
      # Enforces minimum 84% total coverage
      # Generates HTML report uploaded as artifact in next step
      - name: Coverage check
        run: pytest tests/ --cov=src --cov-report=term-missing --cov-report=html --cov-fail-under=84

      # Step 12: Upload HTML coverage report as build artifact
      # Available under Actions run → Artifacts even if tests fail
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

      # Step 13: Code style check (PEP8)
      # Enforces consistent code style across all source files
      # max-line-length=100 matches project convention
      - name: Code style check (flake8)
        run: flake8 src/ --max-line-length=100

      # Step 14: Security scan
      # Bandit scans for common security vulnerabilities in Python code
      # -ll = medium and high severity only
      - name: Security scan (bandit)
        run: bandit -r src/ -ll

      # Step 15: Type check (mypy)
      # Catches type errors before runtime
      # --ignore-missing-imports avoids errors from third-party libs without type stubs
      - name: Type check (mypy)
        run: pip install mypy && mypy src/ --ignore-missing-imports
