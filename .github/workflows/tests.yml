# CI/CD Workflow — Heart Disease Prediction Project
# Runs automatically on every push and pull request to any branch.
# All steps must pass before a branch can be merged to main.

name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest  # Fresh Ubuntu environment for every run

    steps:
      # Step 1: Check out the repository code
      - name: Check out repository
        uses: actions/checkout@v4

      # Step 2: Install Python 3.11 — matches the version used in development
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Install all project dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Run data preparation pipeline
      # Combines heart.csv and heart_kaggle.csv into heart_combined.csv
      # Must run before tests so the combined dataset exists
      - name: Prepare combined dataset
        run: python src/data_preparation.py

      # Step 5: Run the full test suite with coverage reporting
      # Tests cover the following modules:
      #   - src/data_preparation.py : dataset combination, imputation, encoding
      #   - src/data_processing.py  : DataProcessor load, clean, split, correlation
      #   - src/model_training.py   : ModelTrainer pipelines, train, evaluate, compare, save
      #   - src/terminal_app.py     : HeartApp init, predict, prompt_for_inputs, run
      #   - src/main.py             : CLI argument parser, train_and_save, run_app
      #
      # Checks enforced:
      #   --cov-fail-under=84  : total coverage must be at least 84%
      #   --cov-report=term-missing : prints uncovered line numbers to the log
      - name: Run tests with coverage
        run: pytest tests/ --cov=src --cov-report=term-missing --cov-report=html --cov-fail-under=84

      # Step 6: Upload the HTML coverage report as a build artifact
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
